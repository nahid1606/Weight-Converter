<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width= , initial-scale=1.0">
    <title>Weight Converter</title>
    <link rel="stylesheet"href="index.css">
</head>
<body>

    <div class="container">
        <h1 class="heading">Weight-Converter</h1>
        <div class="input-container">
            <level for="Pounds">Pounds:</level>
            <input type="number"id="input"class="input" step=".1" placeholder="Enter Number">
        </div>
        <p>Your weight in KG is:<span>300<p class="error"id="error">Error</p></span></p>
    </div>
    

    <script src="index.js"></script>
</body>
</html>
